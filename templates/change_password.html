{% extends 'base.html' %}

{% block content %}
<div class="flex justify-center items-center h-[70vh]">

<form method="post" class="glass p-10 rounded-2xl w-96 space-y-4 fade-in">
{% csrf_token %}

<h2 class="text-2xl text-center">Новый пароль</h2>

<input name="old_password" type="password" placeholder="Старый пароль"
class="w-full p-3 rounded bg-black/30">

<input name="new_password" type="password" placeholder="Новый пароль"
class="w-full p-3 rounded bg-black/30">

<input name="confirm_password" type="password" placeholder="Посторить новый пароль"
class="w-full p-3 rounded bg-black/30">

<button class="w-full bg-indigo-500 py-3 rounded-xl hover:scale-105 transition">
Сменить пароль
</button>

</form>

</div>
{% endblock %}
