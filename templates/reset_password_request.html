{% extends 'base.html' %}

{% block content %}
<div class="flex justify-center items-center h-[70vh]">

<form method="post" class="glass p-10 rounded-2xl w-96 space-y-4 fade-in">
{% csrf_token %}

<h2 class="text-2xl text-center">Сброс пароля</h2>

<input name="email" placeholder="Введите email"
class="w-full p-3 rounded bg-black/30 focus:ring-2 focus:ring-indigo-500">

<button class="w-full bg-indigo-500 py-3 rounded-xl hover:scale-105 transition">
Отправить ссылку
</button>

</form>

</div>
{% endblock %}
