{% extends 'base.html' %}
{% block content %}

<div class="max-w-7xl mx-auto">

<form method="get" id="filters" class="glass p-4 rounded-2xl mb-6 space-y-4">

<input name="search" placeholder="Поиск..."
value="{{ request.GET.search }}"
class="w-full p-3 rounded border border-orange-400 outline-none focus:ring-2 focus:ring-orange-400 tr-dur">

<div class="grid grid-cols-4 gap-4">

<select name="category" class="p-2 rounded border border-orange-400">
<option value="">Категория</option>
{% for c in categories %}
<option value="{{c.id}}" {% if request.GET.category == c.id|stringformat:"s" %}selected{% endif %}>
{{c.name}}
</option>
{% endfor %}
</select>

<select name="author" class="p-2 rounded border border-orange-400">
<option value="">Автор</option>
{% for a in authors %}
<option value="{{a.id}}">{{a.full_name}}</option>
{% endfor %}
</select>

<input name="min_price" placeholder="Мин цена" class="p-2 rounded outline-none border outline-none focus:ring focus:ring-orange-400 border-orange-400">
<input name="max_price" placeholder="Макс цена" class="p-2 rounded outline-none border outline-none focus:ring focus:ring-orange-400 border-orange-400">

</div>

<select name="sort" class="p-2 rounded border outline-none border-orange-400">
<option value="">Сортировка</option>
<option value="price">Цена ↑</option>
<option value="-price">Цена ↓</option>
<option value="-created_at">Новые</option>
</select>

<button class="bg-orange-400 text-white hover:scale-105 tr-dur px-4 py-2 rounded">Применить</button>

</form>

<!-- GRID -->
<div class="grid grid-cols-4 gap-6">

{% for book in books %}
<div class="glass p-4 rounded-2xl hover:scale-105 group transition glow fade-in">

<img src="{{book.image.url}}" class="rounded-xl h-60 w-full object-cover">

<h3 class="mt-3 text-xl">{{book.title}}</h3>

<p class="text-gray-400 text-sm">{{book.author.full_name}}</p>

<p class="text-indigo-400 font-bold mt-2">{{book.price}} $</p>

<div class="flex gap-2 mt-3 opacity-0 group-hover:opacity-100 transition">

<a href="{% url 'book_detail' book.id %}" class="text-indigo-400">Открыть</a>
{% if has_user %}
<a href="{% url 'book_update' book.id %}" class="text-yellow-400">✏️</a>

<a href="{% url 'book_delete' book.id %}" class="text-red-400">🗑</a>
{% endif %}
</div>

</div>
{% endfor %}

</div>

</div>

{% endblock %}
