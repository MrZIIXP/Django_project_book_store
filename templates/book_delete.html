{% extends 'base.html' %}

{% block content %}
<div class="flex justify-center items-center h-[60vh]">

<div class="glass p-8 rounded-2xl text-center fade-in">

<h2 class="text-2xl mb-4">Удалить книгу?</h2>
<p class="text-gray-400 mb-6">{{ book.title }}</p>

<form method="post">
{% csrf_token %}

<button class="bg-red-500 px-6 py-2 rounded hover:scale-105 transition">
Да, удалить
</button>

<a href="{% url 'book_detail' book.id %}" class="ml-3 text-gray-400">
Отмена
</a>

</form>

</div>

</div>
{% endblock %}
