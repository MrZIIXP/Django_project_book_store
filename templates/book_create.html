{% extends 'base.html' %}

{% block content %}

<form method="post" enctype="multipart/form-data"
class="max-w-xl mx-auto glass p-8 rounded-2xl space-y-4 fade-in">

{% csrf_token %}

<input name="title" placeholder="Название" class="w-full p-3 rounded bg-black/30">
<textarea name="description" placeholder="Описание" class="w-full p-3 rounded bg-black/30"></textarea>

<input name="price" type="number" step="0.01" placeholder="Цена"
class="w-full p-3 rounded bg-black/30">

<select name="author" class="w-full p-3 rounded bg-black/30">
{% for a in authors %}
<option value="{{a.id}}">{{a.full_name}}</option>
{% endfor %}
</select>

<select name="category" class="w-full p-3 rounded bg-black/30">
{% for c in categories %}
<option value="{{c.id}}">{{c.name}}</option>
{% endfor %}
</select>

<input type="file" name="image">

<button class="bg-indigo-500 w-full py-3 rounded-xl hover:scale-105 transition">
Сохранить
</button>

</form>

{% endblock %}
