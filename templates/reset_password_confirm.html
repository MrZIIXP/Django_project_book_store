{% extends 'base.html' %}

{% block content %}
<div class="flex justify-center items-center h-[70vh]">

<form method="post" class="glass p-10 rounded-2xl w-96 space-y-4 fade-in">
{% csrf_token %}

<h2 class="text-2xl text-center">Новый пароль</h2>

<input name="password" type="password" placeholder="Новый пароль"
class="w-full p-3 rounded border border-orange-400">

<input name="confirm_password" type="password" placeholder="Повторите пароль"
class="w-full p-3 rounded border border-orange-400">

<button class="w-full bg-orange-500 text-white py-3 rounded-xl hover:scale-105 transition">
Сменить пароль
</button>

</form>

</div>
{% endblock %}
